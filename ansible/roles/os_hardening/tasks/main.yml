---
- name: Update only security packages
  dnf:
    name: '*'
    security: yes
    state: latest
    update_cache: yes

- name: Ensure firewalld is installed
  dnf:
    name: firewalld
    state: present

# FIX 1: Configure SSH *before* starting the service
- name: Pre-configure Firewalld to allow SSH
  firewalld:
    service: ssh
    permanent: yes
    state: enabled
  # Note: 'immediate: yes' is omitted here because the service isn't running yet

# FIX 2: Now it is safe to start
- name: Start and enable Firewalld
  service:
    name: firewalld
    state: started
    enabled: yes

- name: Allow App Port (8000)
  firewalld:
    port: 8000/tcp
    permanent: yes
    state: enabled
    immediate: yes

- name: Disable SSH password authentication
  lineinfile:
    path: /etc/ssh/sshd_config
    regexp: '^PasswordAuthentication'
    line: 'PasswordAuthentication no'
    state: present
  notify: restart sshd

- name: Force connection reset to apply settings
  meta: reset_connection

- name: Wait for SSH to be available again
  wait_for_connection:
    delay: 5
    timeout: 60