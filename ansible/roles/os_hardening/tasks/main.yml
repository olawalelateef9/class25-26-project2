---
# Ensures the instance is fully booted and SSH is responding before starting
- name: Ensure instance is ready for configuration
  wait_for_connection:
    timeout: 300

- name: Update only security packages
  dnf:
    name: '*'
    security: yes
    state: latest
    update_cache: yes
  become: true

- name: Ensure firewalld is installed
  dnf:
    name: firewalld
    state: present
  become: true

# Pre-configure SSH while service is off. Explicitly targeting the 'public' zone.
- name: Pre-configure Firewalld to allow SSH (Offline)
  ansible.posix.firewalld:
    service: ssh
    permanent: yes
    state: enabled
    zone: public
    offline: true
  become: true

- name: Start and enable Firewalld
  service:
    name: firewalld
    state: started
    enabled: yes
  become: true

# THE STABILIZER: Uses the real IP address (${{ env.BASTION_IP }}) instead of the name "bastion"
- name: Wait for SSH to stabilize after Firewall start
  wait_for:
    host: "{{ ansible_host }}"
    port: 22
    delay: 10
    timeout: 60
    state: started
  delegate_to: localhost
  become: false

- name: Allow App Port (8000)
  ansible.posix.firewalld:
    port: 8000/tcp
    permanent: yes
    state: enabled
    immediate: yes
  become: true

- name: Disable SSH password authentication
  lineinfile:
    path: /etc/ssh/sshd_config
    regexp: '^PasswordAuthentication'
    line: 'PasswordAuthentication no'
    state: present
  become: true
  notify: restart sshd

- name: Force connection reset to apply settings
  meta: reset_connection

- name: Wait for SSH to be available again
  wait_for_connection:
    delay: 5
    timeout: 60