---
- name: Update only security packages
  dnf:
    name: '*'
    security: yes
    state: latest
    update_cache: yes
  become: true

- name: Ensure firewalld is installed
  dnf:
    name: firewalld
    state: present
  become: true

# FIX: Configure SSH *offline* before starting the service
# This writes the rule directly to the XML files so it's active at the first second of startup
- name: Pre-configure Firewalld to allow SSH (Offline)
  ansible.posix.firewalld:
    service: ssh
    permanent: yes
    state: enabled
    offline: true
  become: true

# Now it is safe to start because the SSH "hole" is already in the shield
- name: Start and enable Firewalld
  service:
    name: firewalld
    state: started
    enabled: yes
  become: true

- name: Allow App Port (8000)
  ansible.posix.firewalld:
    port: 8000/tcp
    permanent: yes
    state: enabled
    immediate: yes
  become: true

- name: Disable SSH password authentication
  lineinfile:
    path: /etc/ssh/sshd_config
    regexp: '^PasswordAuthentication'
    line: 'PasswordAuthentication no'
    state: present
  become: true
  notify: restart sshd

- name: Force connection reset to apply settings
  meta: reset_connection

- name: Wait for SSH to be available again
  wait_for_connection:
    delay: 5
    timeout: 60