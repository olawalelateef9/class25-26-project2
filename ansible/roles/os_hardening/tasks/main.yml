---
# 1. Wait for AWS to finish provisioning the hardware and booting the OS
- name: Ensure instance is ready for configuration
  wait_for_connection:
    timeout: 300

- name: Update only security packages
  dnf:
    name: '*'
    security: yes
    state: latest
    update_cache: yes
  become: true

- name: Ensure firewalld is installed
  dnf:
    name: firewalld
    state: present
  become: true

# 2. Configure SSH 'offline' so the rule exists before the service starts
- name: Pre-configure Firewalld to allow SSH (Offline)
  ansible.posix.firewalld:
    service: ssh
    permanent: yes
    state: enabled
    zone: public
    offline: true
  become: true

- name: Start and enable Firewalld
  service:
    name: firewalld
    state: started
    enabled: yes
  become: true

# 3. THE STABILIZER: Uses a 'Hard Override' to ignore the broken SSH tunnel
- name: Wait for SSH to stabilize after Firewall start
  wait_for:
    host: "{{ ansible_host if ansible_ssh_common_args is not defined else '127.0.0.1' }}"
    port: 22
    delay: 10
    timeout: 60
    state: started
  delegate_to: "{{ 'localhost' if ansible_ssh_common_args is not defined else inventory_hostname }}"
  vars:
    # This forces the task to run locally on the runner without checking the Bastion's SSH state
    ansible_connection: local
  become: false

- name: Allow App Port (8000)
  ansible.posix.firewalld:
    port: 8000/tcp
    permanent: yes
    state: enabled
    immediate: yes
  become: true

- name: Disable SSH password authentication
  lineinfile:
    path: /etc/ssh/sshd_config
    regexp: '^PasswordAuthentication'
    line: 'PasswordAuthentication no'
    state: present
  become: true
  notify: restart sshd

# 4. Final verification that we can still get in after all hardening
- name: Force connection reset to apply settings
  meta: reset_connection

- name: Wait for SSH to be available again
  wait_for_connection:
    delay: 5
    timeout: 60